<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Assistent Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="text-center p-8 bg-white rounded-2xl shadow-xl max-w-md w-full">
        <h1 class="text-3xl font-bold mb-4 text-gray-800">Sprechen Sie mit našim KI-Assistent</h1>
        <p class="text-gray-600 mb-8">Kostenloser Anruf über Ihren Browser</p>

        <div id="status" class="text-sm font-medium mb-4 text-green-600">Bereit za poziv...</div>

        <button id="callBtn" class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-4 px-10 rounded-full transition-all duration-300 shadow-lg flex items-center justify-center mx-auto space-x-2">
            <span id="btnText">Gespräch beginnen</span>
        </button>

        <div class="mt-8 text-xs text-gray-400">
            Powered by Groq & ElevenLabs
        </div>
    </div>

    <script>
        const callBtn = document.getElementById('callBtn');
        const btnText = document.getElementById('btnText');
        const status = document.getElementById('status');
        
        // TVOJ SUPABASE LINK
        const SUPABASE_URL = 'https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent';

        let isCalling = false;

        async function startConversation() {
            if (isCalling) return;
            
            isCalling = true;
            status.innerText = "KI razmišlja...";
            callBtn.classList.add('pulse', 'opacity-50');
            btnText.innerText = "Verbindung...";

            try {
                const response = await fetch(SUPABASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userText: "Guten Tag! Ich bin Ihr KI-Assistent. Wie kann ich Ihnen heute helfen?" 
                    })
                });

                if (!response.ok) throw new Error('Greška u komunikaciji');

                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                
                status.innerText = "KI spricht...";
                btnText.innerText = "KI spricht...";
                
                audio.play();

                audio.onended = () => {
                    resetUI();
                };

            } catch (err) {
                console.error(err);
                status.innerText = "Greška! Provjeri API ključeve.";
                resetUI();
            }
        }

        function resetUI() {
            isCalling = false;
            status.innerText = "Bereit za poziv...";
            callBtn.classList.remove('pulse', 'opacity-50');
            btnText.innerText = "Gespräch beginnen";
        }

        callBtn.addEventListener('click', startConversation);
    </script>
</body>
</html>
