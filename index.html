<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Assistent Call & Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col" style="height: 600px;">
        <div class="bg-gray-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">KI-Assistent</h1>
            <p class="text-gray-400 text-sm">Groq & ElevenLabs integracija</p>
        </div>

        <div id="chat-window" class="flex-grow p-6 overflow-y-auto space-y-4 bg-gray-50">
            <div class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 rounded-2xl px-4 py-2 max-w-[80%] text-sm">
                    Klicken Sie unten, um das Gespräch zu beginnen.
                </div>
            </div>
        </div>

        <div class="p-6 bg-white border-t border-gray-100 text-center">
            <div id="status" class="text-xs font-semibold mb-4 text-gray-400 uppercase tracking-widest">Bereit</div>
            
            <button id="callBtn" class="bg-gray-800 hover:bg-black text-white font-bold py-4 px-10 rounded-full transition-all duration-300 shadow-lg flex items-center justify-center mx-auto space-x-2 w-full">
                <span id="btnText">Gespräch beginnen</span>
            </button>
        </div>
    </div>

    <script>
        const callBtn = document.getElementById('callBtn');
        const btnText = document.getElementById('btnText');
        const status = document.getElementById('status');
        const chatWindow = document.getElementById('chat-window');
        
        const SUPABASE_URL = 'https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent';

        let isCalling = false;

        function addMessageToChat(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = "flex justify-start";
            msgDiv.innerHTML = `
                <div class="bg-blue-600 text-white rounded-2xl px-4 py-2 max-w-[80%] text-sm shadow-md animate-fade-in">
                    ${text}
                </div>
            `;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function startConversation() {
            if (isCalling) return;
            
            isCalling = true;
            status.innerText = "VERBINDEN...";
            status.className = "text-xs font-semibold mb-4 text-blue-500 uppercase tracking-widest";
            callBtn.classList.add('pulse', 'opacity-50');
            btnText.innerText = "Bitte warten...";

            try {
                // Pozivamo tvoju Supabase funkciju
                const response = await fetch(SUPABASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userText: "Guten Tag! Ich bin Ihr KI-Assistent. Wie kann ich Ihnen heute helfen?" 
                    })
                });

                if (!response.ok) throw new Error('Greška');

                // Uzimamo audio
                const audioBlob = await response.blob();
                
                // POKUŠAJ IZDVAJANJA TEKSTA IZ HEADERA (Ako ga tvoja funkcija šalje)
                // Ako ne, ispisaćemo fiksnu poruku ili modifikovati funkciju kasnije
                addMessageToChat("Guten Tag! Ich bin Ihr KI-Assistent. Wie kann ich Ihnen heute helfen?");

                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                
                status.innerText = "KI SPRICHT...";
                btnText.innerText = "KI spricht...";
                
                audio.play();

                audio.onended = () => {
                    resetUI();
                };

            } catch (err) {
                console.error(err);
                status.innerText = "FEHLER!";
                status.className = "text-xs font-semibold mb-4 text-red-500 uppercase tracking-widest";
                resetUI();
            }
        }

        function resetUI() {
            isCalling = false;
            status.innerText = "BEREIT";
            status.className = "text-xs font-semibold mb-4 text-gray-400 uppercase tracking-widest";
            callBtn.classList.remove('pulse', 'opacity-50');
            btnText.innerText = "Gespräch beginnen";
        }

        callBtn.addEventListener('click', startConversation);
    </script>
</body>
</html>
