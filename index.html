<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI-Automation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { background: white; width: 100%; max-width: 400px; height: 650px; border-radius: 30px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .header { background: #1e293b; color: white; padding: 20px; text-align: center; }
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .user { background: #1e293b; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #2563eb; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; background: white; border-top: 1px solid #e2e8f0; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; box-sizing: border-box; margin-bottom: 12px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #2563eb; }
        button { width: 100%; padding: 16px; background: #1e293b; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        #status { font-size: 10px; text-align: center; color: #94a3b8; padding: 8px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h3 style="margin:0">NH AI-Automation</h3>
        <small style="opacity: 0.7">Voice Barge-in Demo</small>
    </div>
    <div id="chat-window"></div>
    <div id="status">Bereit</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Schreiben oder sprechen..." autocomplete="off">
        <button id="callBtn">STARTEN / STOPPEN</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const callBtn = document.getElementById('callBtn');
    const status = document.getElementById('status');

    let isCalling = false;

    // --- AUDIO CONTEXT ZA DETEKCIJU GLASA (BARGE-IN) ---
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new Recognition();
    recognition.lang = 'de-DE';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
        // KLJUČNA LOGIKA: Ako detektujemo bilo kakav rezultat dok AI priča -> ugasi AI
        if (window.speechSynthesis.speaking) {
            console.log("Detektovan glas - Prekidam AI");
            window.speechSynthesis.cancel();
            status.innerText = "Listening (Interrupted)...";
        }

        const transcript = event.results[event.results.length - 1][0].transcript;
        userInput.value = transcript;

        if (event.results[event.results.length - 1].isFinal) {
            posalji();
        }
    };

    async function posalji() {
        const tekst = userInput.value.trim();
        if (!tekst) return;

        window.speechSynthesis.cancel(); 
        
        // Dodaj poruku u chat
        const div = document.createElement('div');
        div.className = 'msg user';
        div.innerText = tekst;
        chatWindow.appendChild(div);
        userInput.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        status.innerText = "Thinking...";

        try {
            const res = await fetch('https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userText: tekst })
            });
            const data = await res.json();
            const odgovor = data.tekst || data.reply;

            if (odgovor) {
                prikaziIOdgovori(odgovor);
            }
        } catch (e) {
            status.innerText = "Error!";
        }
    }

    function prikaziIOdgovori(odgovor) {
        const aiDiv = document.createElement('div');
        aiDiv.className = 'msg ai';
        aiDiv.innerText = odgovor;
        chatWindow.appendChild(aiDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        
        const utt = new SpeechSynthesisUtterance(odgovor);
        
        // Detekcija jezika
        const balkan = /[čćšžđ]|(hvala|dobro|šta|kako)/i;
        utt.lang = balkan.test(odgovor) ? 'bs-BA' : 'de-DE';
        
        utt.onstart = () => { status.innerText = "AI Speaking..."; };
        utt.onend = () => { if(isCalling) status.innerText = "Listening..."; else status.innerText = "Bereit"; };
        
        window.speechSynthesis.speak(utt);
    }

    // ENTER TASTER FIX
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            posalji();
        }
    });

    callBtn.onclick = () => {
        if (!isCalling) {
            isCalling = true;
            status.innerText = "Listening...";
            callBtn.style.background = "#ef4444";
            callBtn.innerText = "STOPPEN";
            recognition.start();
        } else {
            isCalling = false;
            status.innerText = "Bereit";
            callBtn.style.background = "#1e293b";
            callBtn.innerText = "STARTEN / STOPPEN";
            recognition.stop();
            window.speechSynthesis.cancel();
        }
    };
</script>
</body>
</html>
