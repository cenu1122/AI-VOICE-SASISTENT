<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI-Automation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { background: white; width: 100%; max-width: 400px; height: 680px; border-radius: 30px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .header { background: #1e293b; color: white; padding: 20px; text-align: center; }
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .user { background: #1e293b; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #2563eb; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; background: white; border-top: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 8px; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #sendBtn { background: #2563eb; color: white; }
        #callBtn { background: #1e293b; color: white; }
        #status { font-size: 10px; text-align: center; color: #94a3b8; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h3 style="margin:0">NH AI-Automation</h3>
        <small style="opacity: 0.7">Nusret Halilović AI</small>
    </div>
    <div id="chat-window"></div>
    <div id="status">Spreman</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Upiši poruku..." autocomplete="off">
        <button id="sendBtn">POŠALJI PORUKU (ENTER)</button>
        <button id="callBtn">POKRENI GLASOVNO</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const callBtn = document.getElementById('callBtn');
    const status = document.getElementById('status');

    let isCalling = false;
    let currentAudio = null;
    let recognition = null;

    // --- GLASOVNI DIO (SAD JE U TRY/CATCH DA NE KVARI ENTER) ---
    try {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'bs-BA';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.onresult = (e) => {
                if (currentAudio) currentAudio.pause();
                const transcript = e.results[e.results.length - 1][0].transcript;
                userInput.value = transcript;
                if (e.results[e.results.length - 1].isFinal) posalji();
            };
        }
    } catch (err) { console.log("Glas nije podržan."); }

    // GLAVNA FUNKCIJA ZA SLANJE
    async function posalji() {
        const tekst = userInput.value.trim();
        if (!tekst) return;

        if (currentAudio) currentAudio.pause();

        // Prikaži user poruku
        const uDiv = document.createElement('div');
        uDiv.className = 'msg user';
        uDiv.innerText = tekst;
        chatWindow.appendChild(uDiv);
        
        userInput.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;
        status.innerText = "Razmišljam...";

        try {
            const res = await fetch('https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userText: tekst })
            });
            const data = await res.json();

            if (data.tekst) {
                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai';
                aiDiv.innerText = data.tekst;
                chatWindow.appendChild(aiDiv);
                chatWindow.scrollTop = chatWindow.scrollHeight;

                if (data.audio) {
                    status.innerText = "AI priča...";
                    currentAudio = new Audio("data:audio/mpeg;base64," + data.audio);
                    currentAudio.play();
                }
            }
            status.innerText = "Spreman";
        } catch (e) {
            status.innerText = "Greška!";
        }
    }

    // KLIK NA DUGME POŠALJI
    sendBtn.onclick = posalji;

    // ENTER TASTER
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            posalji();
        }
    });

    // GLASOVNO DUGME
    callBtn.onclick = () => {
        if (!recognition) return alert("Koristite Chrome za glas.");
        if (!isCalling) {
            isCalling = true;
            status.innerText = "Slušam...";
            callBtn.innerText = "STOP";
            recognition.start();
        } else {
            isCalling = false;
            status.innerText = "Spreman";
            callBtn.innerText = "POKRENI GLASOVNO";
            recognition.stop();
        }
    };
</script>
</body>
</html>
