<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Assistent Call & Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col" style="height: 700px;">
        <div class="bg-gray-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">KI-Assistent</h1>
            <p class="text-gray-400 text-sm">Groq & ElevenLabs integracija</p>
        </div>

        <div id="chat-window" class="flex-grow p-6 overflow-y-auto space-y-4 bg-gray-50">
            <div class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 rounded-2xl px-4 py-2 max-w-[80%] text-sm">
                    Guten Tag! Wie kann ich Ihnen heute helfen?
                </div>
            </div>
        </div>

        <div id="status" class="text-[10px] font-semibold py-2 text-center text-gray-400 uppercase tracking-widest bg-white border-t border-gray-50">
            Bereit
        </div>

        <div class="p-4 bg-white border-t border-gray-100">
            <div class="flex flex-col space-y-3">
                <input type="text" id="userInput" 
                    class="w-full p-4 bg-gray-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 transition-all" 
                    placeholder="Schreiben Sie nešto..." 
                    autocomplete="off">
                
                <button id="callBtn" class="bg-gray-800 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg flex items-center justify-center space-x-2 w-full">
                    <span id="btnText">Senden & Sprechen</span>
                </button>
            </div>
        </div>
    </div>

<script>
    const callBtn = document.getElementById('callBtn');
    const btnText = document.getElementById('btnText');
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');
    const userInput = document.getElementById('userInput');

    let isCalling = false;
    let isAITalking = false;

    // --- KONFIGURACIJA SLUŠANJA SA PREKIDANJEM ---
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new Recognition();
    recognition.lang = 'de-DE'; 
    recognition.continuous = true; // Sluša stalno
    recognition.interimResults = true; // Detektuje glas čim počneš pričati

    recognition.onresult = (event) => {
        // Ako AI priča, a ti počneš pričati, odmah gasi AI zvuk
        if (isAITalking) {
            window.speechSynthesis.cancel();
            isAITalking = false;
            status.innerText = "PREKIDANJE...";
        }

        const result = event.results[event.results.length - 1];
        if (result.isFinal) {
            const transcript = result[0].transcript;
            userInput.value = transcript;
            pokreniAsistenta(); // Šalje AI-u novi input
        }
    };

    function addMessageToChat(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = role === 'user' ? "flex justify-end mb-2" : "flex justify-start mb-2";
        const bgColor = role === 'user' ? "bg-gray-800 text-white" : "bg-blue-600 text-white";
        const label = role === 'user' ? "Vi" : "AI";

        msgDiv.innerHTML = `
            <div class="${bgColor} p-3 rounded-2xl shadow-md text-sm animate-fade-in max-w-[85%]">
                <span class="block text-[10px] opacity-70 mb-1">${label}</span>
                ${text}
            </div>
        `;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function pokreniAsistenta() {
        const tekstZaSlanje = userInput.value.trim();
        if (!tekstZaSlanje) return;
        
        addMessageToChat('user', tekstZaSlanje);
        userInput.value = ""; 
        
        isCalling = true;
        status.innerText = "RAZMIŠLJAM...";

        try {
            const response = await fetch('https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userText: tekstZaSlanje,
                    // Šaljemo AI-u instrukciju da skonta da li je ovo nastavak ili novo pitanje
                    context: "Handle interruption. Decice whether to continue previous point or answer new question."
                })
            });

            const data = await response.json();
            const odgovor = data.tekst || data.reply;

            if (odgovor) {
                addMessageToChat('ai', odgovor);
                govori(odgovor);
            }
        } catch (err) {
            status.innerText = "GREŠKA!";
            resetUI();
        }
    }

    function govori(tekst) {
        isAITalking = true;
        status.innerText = "AI GOVORI...";
        
        const utterance = new SpeechSynthesisUtterance(tekst);
        utterance.lang = 'de-DE';
        
        utterance.onend = () => {
            isAITalking = false;
            if (isCalling) status.innerText = "SLUŠAM (AKTIVNO)...";
        };

        window.speechSynthesis.speak(utterance);
    }

    callBtn.onclick = () => {
        if (!isCalling) {
            isCalling = true;
            status.innerText = "SLUŠAM...";
            callBtn.classList.add('bg-red-600', 'pulse');
            btnText.innerText = "Aktivna veza";
            recognition.start(); // Pali mikrofon i ne gasi ga
        } else {
            // Isključi sve
            isCalling = false;
            recognition.stop();
            window.speechSynthesis.cancel();
            resetUI();
        }
    };

    function resetUI() {
        isCalling = false;
        isAITalking = false;
        status.innerText = "BEREIT";
        callBtn.classList.remove('pulse', 'bg-red-600');
        btnText.innerText = "Senden & Sprechen";
    }
</script>
</body>
</html>
