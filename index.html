<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI-Automation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { background: white; width: 100%; max-width: 400px; height: 680px; border-radius: 30px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .header { background: #1e293b; color: white; padding: 20px; text-align: center; }
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .user { background: #1e293b; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #2563eb; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; background: white; border-top: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 8px; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #sendBtn { background: #2563eb; color: white; }
        #callBtn { background: #1e293b; color: white; }
        #status { font-size: 10px; text-align: center; color: #94a3b8; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h3 style="margin:0">NH AI-Automation</h3>
        <small style="opacity: 0.7">Nusret Halilović AI</small>
    </div>
    <div id="chat-window"></div>
    <div id="status">Spreman</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Upiši poruku..." autocomplete="off">
        <button id="sendBtn">POŠALJI PORUKU (ENTER)</button>
        <button id="callBtn">POKRENI GLASOVNO</button>
    </div>
</div>

<script>
    // --- TVOJ URL ---
    const URL_FUNKCIJE = 'https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent'; 

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const callBtn = document.getElementById('callBtn');
    const status = document.getElementById('status');

    let isCalling = false;

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Besplatni Google glas (Web Speech API)
    function progovori(tekst) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Prekini prethodni govor
            const msg = new SpeechSynthesisUtterance(tekst);
            msg.lang = 'bs-BA'; 
            msg.rate = 1.0;
            
            // Pokušaj naći najbolji glas (Hrvatski/Srpski/Bosanski su slični AI-u)
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.includes('hr') || v.lang.includes('sr') || v.lang.includes('bs'));
            if (preferredVoice) msg.voice = preferredVoice;

            window.speechSynthesis.speak(msg);
        }
    }

    async function posalji(tekstManual) {
        const tekst = tekstManual || userInput.value.trim();
        if (!tekst) return;

        addMsg(tekst, 'user');
        userInput.value = "";
        status.innerText = "Razmišljam...";

        try {
            const res = await fetch(URL_FUNKCIJE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userText: tekst })
            });

            const data = await res.json();

            if (data.tekst) {
                addMsg(data.tekst, 'ai');
                progovori(data.tekst);
            }
            status.innerText = "Spreman";
        } catch (err) {
            console.error("Greška:", err);
            status.innerText = "Greška u konekciji!";
        }
    }

    userInput.onkeydown = (e) => { if(e.key === 'Enter') posalji(); };
    sendBtn.onclick = () => posalji();

    // Prepoznavanje glasa
    try {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new SpeechRecognition();
        rec.lang = 'bs-BA';

        rec.onresult = (e) => {
            const tr = e.results[0][0].transcript;
            posalji(tr);
        };

        rec.onend = () => {
            isCalling = false;
            callBtn.innerText = "POKRENI GLASOVNO";
            callBtn.style.background = "#1e293b";
        };

        callBtn.onclick = () => {
            if (!isCalling) {
                window.speechSynthesis.cancel();
                rec.start();
                isCalling = true;
                callBtn.innerText = "SLUŠAM...";
                callBtn.style.background = "red";
                status.innerText = "Slušam...";
            } else {
                rec.stop();
            }
        };
    } catch(e) {
        status.innerText = "Glasovne funkcije nisu podržane.";
    }
</script>
</body>
</html>
