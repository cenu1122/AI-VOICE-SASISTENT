<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NH AI-Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Popravka za mobilne uređaje da ne skače tastatura */
        body { touch-action: manipulation; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-2 sm:p-4">

    <div class="bg-white rounded-[2.5rem] shadow-2xl max-w-md w-full overflow-hidden flex flex-col h-[90vh] sm:h-[750px]">
        
        <div class="bg-gray-800 p-5 text-white text-center shadow-lg">
            <h1 class="text-xl font-bold tracking-tight">NH AI-Automation</h1>
            <p class="text-gray-400 text-[10px] uppercase tracking-widest">Digitaler Assistent</p>
        </div>

        <div id="chat-window" class="flex-grow p-4 overflow-y-auto space-y-4 bg-gray-50 flex flex-col">
            <div class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 rounded-2xl px-4 py-2 max-w-[85%] text-sm shadow-sm">
                    Guten Tag! Ich bin der Assistent von Nusret Halilović. Wie kann ich Ihnen helfen?
                </div>
            </div>
        </div>

        <div id="status" class="text-[9px] font-bold py-2 text-center text-gray-400 uppercase tracking-[0.2em] bg-white border-t border-gray-50">
            Bereit
        </div>

        <div class="p-4 bg-white border-t border-gray-100">
            <div class="flex flex-col space-y-3">
                <input type="text" id="userInput" 
                    class="w-full p-4 bg-gray-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all border-none" 
                    placeholder="Schreiben Sie etwas..." 
                    autocomplete="off">
                
                <button id="callBtn" class="bg-gray-800 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg flex items-center justify-center space-x-2 w-full active:scale-95">
                    <span id="btnText">Senden & Sprechen</span>
                </button>
            </div>
        </div>
    </div>

<script>
    const callBtn = document.getElementById('callBtn');
    const btnText = document.getElementById('btnText');
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');
    const userInput = document.getElementById('userInput');

    let isCalling = false;
    let isAITalking = false;

    // --- GOVORNA KONFIGURACIJA ---
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new Recognition();
    recognition.lang = 'de-DE'; 
    recognition.continuous = true; 
    recognition.interimResults = true;

    recognition.onresult = (event) => {
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            isAITalking = false;
        }

        const result = event.results[event.results.length - 1];
        if (result.isFinal) {
            userInput.value = result[0].transcript;
            pokreniAsistenta(); 
        }
    };

    function addMessageToChat(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = role === 'user' ? "flex justify-end mb-2" : "flex justify-start mb-2";
        const bgColor = role === 'user' ? "bg-gray-800 text-white" : "bg-blue-600 text-white";
        const label = role === 'user' ? "Sie" : "AI";

        msgDiv.innerHTML = `
            <div class="${bgColor} p-3 rounded-2xl shadow-md text-sm animate-fade-in max-w-[85%]">
                <span class="block text-[10px] opacity-70 mb-1 font-bold">${label}</span>
                ${text}
            </div>
        `;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
    }

    async function pokreniAsistenta() {
        const tekstZaSlanje = userInput.value.trim();
        if (!tekstZaSlanje) return;

        window.speechSynthesis.cancel();
        addMessageToChat('user', tekstZaSlanje);
        userInput.value = ""; 
        
        status.innerText = "DENKE NACH...";
        callBtn.style.opacity = "0.5";

        try {
            const response = await fetch('https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userText: tekstZaSlanje })
            });

            const data = await response.json();
            const odgovor = data.tekst || data.reply;

            if (odgovor) {
                addMessageToChat('ai', odgovor);
                govori(odgovor);
            }
        } catch (err) {
            status.innerText = "FEHLER!";
        } finally {
            callBtn.style.opacity = "1";
        }
    }

    function govori(tekst) {
        window.speechSynthesis.cancel();
        isAITalking = true;
        status.innerText = "KI SPRICHT...";
        
        const utterance = new SpeechSynthesisUtterance(tekst);
        const balkanPattern = /[čćšžđ]|(hvala|dobro|šta|kako|sam|jesi|da|ne)/i;
        utterance.lang = balkanPattern.test(tekst) ? 'bs-BA' : 'de-DE';
        
        utterance.onend = () => {
            isAITalking = false;
            status.innerText = isCalling ? "HÖRE ZU..." : "BEREIT";
        };
        window.speechSynthesis.speak(utterance);
    }

    // ENTER TASTER - POPRAVLJENO ZA SVE UREĐAJE
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            pokreniAsistenta();
        }
    });

    callBtn.onclick = () => {
        if (!isCalling) {
            isCalling = true;
            status.innerText = "HÖRE ZU...";
            callBtn.classList.add('bg-red-600', 'pulse');
            btnText.innerText = "Verbindung Aktiv";
            recognition.start();
        } else {
            isCalling = false;
            recognition.stop();
            window.speechSynthesis.cancel();
            resetUI();
        }
    };

    function resetUI() {
        isCalling = false;
        isAITalking = false;
        status.innerText = "BEREIT";
        callBtn.classList.remove('pulse', 'bg-red-600');
        btnText.innerText = "Senden & Sprechen";
    }
</script>
</body>
</html>
