<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI-Automation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { background: white; width: 100%; max-width: 400px; height: 650px; border-radius: 30px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .header { background: #1e293b; color: white; padding: 20px; text-align: center; }
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .user { background: #1e293b; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #2563eb; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; background: white; border-top: 1px solid #e2e8f0; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; box-sizing: border-box; margin-bottom: 12px; outline: none; }
        button { width: 100%; padding: 16px; background: #1e293b; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #status { font-size: 10px; text-align: center; color: #94a3b8; padding: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h3 style="margin:0">NH AI-Automation</h3>
        <small style="opacity: 0.7">Nusret Halilović AI</small>
    </div>
    <div id="chat-window"></div>
    <div id="status">Spreman</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Piši ili pričaj..." autocomplete="off">
        <button id="callBtn">POKRENI ASISTENTA</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const callBtn = document.getElementById('callBtn');
    const status = document.getElementById('status');

    let isCalling = false;
    let currentAudio = null; 
    let recognition = null; // Definišemo ga kao prazno na početku

    // --- POPRAVLJENI DIO: Sigurno pokretanje prepoznavanja ---
    try {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'hr-BA'; 
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                if (currentAudio && !currentAudio.paused) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                    status.innerText = "Slušam (Prekinuto)...";
                }
                const transcript = event.results[event.results.length - 1][0].transcript;
                userInput.value = transcript;
                if (event.results[event.results.length - 1].isFinal) {
                    posalji();
                }
            };
        }
    } catch (e) {
        console.log("Glasovno prepoznavanje nije podržano u ovom browseru.");
    }

    async function posalji() {
        const tekst = userInput.value.trim();
        if (!tekst) return;

        if (currentAudio) currentAudio.pause();

        dodajPoruku(tekst, 'user');
        userInput.value = "";
        status.innerText = "Razmišljam...";

        try {
            const res = await fetch('https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userText: tekst })
            });
            const data = await res.json();

            if (data.tekst) {
                dodajPoruku(data.tekst, 'ai');
                if (data.audio) {
                    pustiElevenLabsAudio(data.audio);
                }
            }
        } catch (e) {
            status.innerText = "Greška u konekciji!";
            console.error(e);
        }
    }

    function dodajPoruku(tekst, pošiljalac) {
        const div = document.createElement('div');
        div.className = `msg ${pošiljalac}`;
        div.innerText = tekst;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function pustiElevenLabsAudio(base64Audio) {
        if (currentAudio) currentAudio.pause();
        status.innerText = "AI priča...";
        currentAudio = new Audio("data:audio/mpeg;base64," + base64Audio);
        currentAudio.play();
        currentAudio.onended = () => {
            status.innerText = isCalling ? "Slušam..." : "Spreman";
        };
    }

    // --- OVO SADA RADI JER NEMA GREŠKE IZNAD ---
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            posalji();
        }
    });

    callBtn.onclick = () => {
        if (!recognition) {
            alert("Glasovno prepoznavanje nije podržano u ovom pretraživaču. Koristite Chrome.");
            return;
        }
        if (!isCalling) {
            isCalling = true;
            status.innerText = "Slušam...";
            callBtn.style.background = "#ef4444";
            callBtn.innerText = "ZAUSTAVI";
            recognition.start();
        } else {
            isCalling = false;
            status.innerText = "Spreman";
            callBtn.style.background = "#1e293b";
            callBtn.innerText = "POKRENI ASISTENTA";
            recognition.stop();
            if (currentAudio) currentAudio.pause();
        }
    };
</script>
</body>
</html>
