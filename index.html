<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Assistent Call & Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col" style="height: 700px;">
        <div class="bg-gray-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">KI-Assistent</h1>
            <p class="text-gray-400 text-sm">Groq & ElevenLabs integracija</p>
        </div>

        <div id="chat-window" class="flex-grow p-6 overflow-y-auto space-y-4 bg-gray-50">
            <div class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 rounded-2xl px-4 py-2 max-w-[80%] text-sm">
                    Guten Tag! Wie kann ich Ihnen heute helfen?
                </div>
            </div>
        </div>

        <div id="status" class="text-[10px] font-semibold py-2 text-center text-gray-400 uppercase tracking-widest bg-white border-t border-gray-50">
            Bereit
        </div>

        <div class="p-4 bg-white border-t border-gray-100">
            <div class="flex flex-col space-y-3">
                <input type="text" id="userInput" 
                    class="w-full p-4 bg-gray-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 transition-all" 
                    placeholder="Schreiben Sie nešto..." 
                    autocomplete="off">
                
                <button id="callBtn" class="bg-gray-800 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg flex items-center justify-center space-x-2 w-full">
                    <span id="btnText">Senden & Sprechen</span>
                </button>
            </div>
        </div>
    </div>

   <script>
    const callBtn = document.getElementById('callBtn');
    const btnText = document.getElementById('btnText');
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');
    const userInput = document.getElementById('userInput');

    let isCalling = false;

    function addMessageToChat(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = role === 'user' ? "flex justify-end mb-2" : "flex justify-start mb-2";
        const bgColor = role === 'user' ? "bg-gray-800 text-white" : "bg-blue-600 text-white";
        const label = role === 'user' ? "Vi" : "AI";

        msgDiv.innerHTML = `
            <div class="${bgColor} p-3 rounded-2xl shadow-md text-sm animate-fade-in max-w-[85%]">
                <span class="block text-[10px] opacity-70 mb-1">${label}</span>
                ${text}
            </div>
        `;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function pokreniAsistenta() {
        // 1. Prekini bilo kakav prethodni govor odmah
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }

        const tekstZaSlanje = userInput.value.trim();
        
        // Provjera da li je polje prazno ili je poziv već u toku
        if (isCalling || !tekstZaSlanje) return;
        
        // UI Update
        addMessageToChat('user', tekstZaSlanje);
        userInput.value = ""; 
        
        isCalling = true;
        status.innerText = "RAZMIŠLJAM...";
        callBtn.classList.add('pulse', 'opacity-50');
        btnText.innerText = "Warten...";

        try {
            const response = await fetch('https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userText: tekstZaSlanje })
            });

            if (!response.ok) throw new Error('Mrežna greška ili Supabase Error');

            const data = await response.json();

            if (data.tekst || data.reply) {
                const odgovor = data.tekst || data.reply;
                addMessageToChat('ai', odgovor);
                status.innerText = "GOVORIM...";

                // --- GOOGLE WEB VOICE ---
                const synth = window.speechSynthesis;
                const utterance = new SpeechSynthesisUtterance(odgovor);
                
                utterance.lang = 'de-DE'; // Njemački jezik
                utterance.pitch = 1;
                utterance.rate = 1;

                utterance.onend = () => resetUI();
                synth.speak(utterance);
            } else {
                resetUI();
            }

        } catch (err) {
            console.error(err);
            status.innerText = "GREŠKA: " + err.message;
            status.classList.add('text-red-500');
            resetUI();
        }
    }

    function resetUI() {
        isCalling = false;
        status.innerText = "BEREIT";
        status.classList.remove('text-red-500');
        callBtn.classList.remove('pulse', 'opacity-50');
        btnText.innerText = "Senden & Sprechen";
    }

    // Event listeneri moraju biti izvan funkcije pokreniAsistenta
    callBtn.onclick = () => pokreniAsistenta();

    userInput.onkeypress = (e) => {
        if (e.key === 'Enter') {
            pokreniAsistenta();
        }
    };
</script>
</body>
</html>
